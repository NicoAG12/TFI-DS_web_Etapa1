apiVersion: apps/v1
kind: Deployment
metadata:
  name: saga-orchestrator
  namespace: tfi-prod
  labels:
    app: saga-orchestrator
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: saga-orchestrator
  template:
    metadata:
      labels:
        app: saga-orchestrator
    spec:
      containers:
        - name: saga-orchestrator
          image: ghcr.io/mi-organizacion/saga-orchestrator:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4301
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          env:
            - name: PORT
              value: "4301"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 4301
            initialDelaySeconds: 15
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 4301
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
