apiVersion: apps/v1
kind: Deployment
metadata:
  name: torneos-service
  namespace: tfi-prod
  labels:
    app: torneos-service
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: torneos-service
  template:
    metadata:
      labels:
        app: torneos-service
    spec:
      containers:
        - name: torneos-service
          image: ghcr.io/mi-organizacion/torneos-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4204
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          env:
            - name: PORT
              value: "4204"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 4204
            initialDelaySeconds: 15
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 4204
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
