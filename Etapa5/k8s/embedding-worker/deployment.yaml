apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedding-worker
  namespace: tfi-prod
  labels:
    app: embedding-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: embedding-worker
  template:
    metadata:
      labels:
        app: embedding-worker
    spec:
      containers:
        - name: embedding-worker
          image: ghcr.io/mi-organizacion/embedding-worker:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: ai-config
            - secretRef:
                name: ai-secrets
            - configMapRef:
                name: app-config
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

